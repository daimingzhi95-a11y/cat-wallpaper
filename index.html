<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="定制猫咪外观，生成专属猫咪姿势壁纸。" />
    <title>喵图鉴 · 猫咪壁纸工坊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css?v=20260607-comic-wallpaper" />
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <a class="brand" href="#" aria-label="喵图鉴首页"><span class="brand-mark">⌁</span><span data-i18n="brand">ねこ図鑑</span></a>
        <div class="language-switch" aria-label="Language">
          <button type="button" class="lang-btn is-active" data-lang="ja">日本語</button>
          <button type="button" class="lang-btn" data-lang="zh">中文</button>
          <button type="button" class="lang-btn" data-lang="en">EN</button>
        </div>
        <button id="download-btn" class="download-btn" type="button"><span data-i18n="download">壁紙を保存</span><span aria-hidden="true">↓</span></button>
      </header>

      <section class="hero-stage" aria-labelledby="preview-title">
        <div class="stage-heading">
          <div>
            <h1 id="preview-title" data-i18n="previewTitle">あなただけのねこ図鑑</h1>
          </div>
        </div>

        <div class="preview-arena">
          <div class="arena-orbit orbit-one"></div>
          <div class="arena-orbit orbit-two"></div>
          <div class="wallpaper-frame">
            <div class="frame-corner corner-a"></div><div class="frame-corner corner-b"></div>
            <div id="wallpaper" class="wallpaper wallpaper-mobile">
              <div id="background-scene" class="background-scene" aria-hidden="true"></div>
              <div class="paper-grain"></div>
              <div id="pose-ring" class="pose-ring" aria-hidden="true"></div>
              <div class="portrait-card">
                <div class="photo-frame">
                  <img id="photo-preview" alt="猫咪照片预览" />
                  <div id="photo-placeholder" class="photo-placeholder" aria-hidden="true"><span class="placeholder-ears">⌃</span><span class="placeholder-face">• ᴗ •</span></div>
                </div>
                <div id="wallpaper-name" class="wallpaper-name">Mochi</div>
                <div class="wallpaper-caption">my tiny roommate</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="customizer" aria-labelledby="customizer-title">
        <div class="customizer-top">
          <div><h2 id="customizer-title" data-i18n="customize">ねこの見た目をカスタム</h2></div>
          <div class="customizer-actions">
            <nav class="customizer-tabs" aria-label="设置分类">
              <button type="button" class="tab-btn is-active" data-tab="looks" data-i18n="looks">01 見た目</button>
              <button type="button" class="tab-btn" data-tab="scene" data-i18n="scene">02 シーン</button>
              <button type="button" class="tab-btn" data-tab="profile" data-i18n="profile">03 プロフィール</button>
            </nav>
            <button id="drawer-toggle" class="drawer-toggle" type="button" aria-expanded="true"><span data-drawer-label>設定を閉じる</span><span class="drawer-chevron" aria-hidden="true">⌄</span></button>
          </div>
        </div>

        <form id="cat-form">
          <section class="tab-panel is-active" data-panel="looks">
            <div class="control-card trait-card">
              <fieldset><legend data-i18n="fur">毛並み</legend><div class="segmented-control"><label><input type="radio" name="fur" value="short" checked /><span data-i18n="shortFur">短毛</span></label><label><input type="radio" name="fur" value="long" /><span data-i18n="longFur">長毛</span></label></div></fieldset>
            </div>
            <div class="control-card trait-card">
              <fieldset><legend data-i18n="tail">しっぽ</legend><div class="segmented-control"><label><input type="radio" name="tail" value="long" checked /><span data-i18n="longTail">長い</span></label><label><input type="radio" name="tail" value="short" /><span data-i18n="shortTail">短い</span></label></div></fieldset>
            </div>
            <div class="control-card trait-card">
              <fieldset><legend data-i18n="legs">足の長さ</legend><div class="segmented-control"><label><input type="radio" name="legs" value="short" checked /><span data-i18n="shortLegs">短い</span></label><label><input type="radio" name="legs" value="long" /><span data-i18n="longLegs">長い</span></label></div></fieldset>
            </div>
            <div class="control-card trait-card">
              <fieldset><legend data-i18n="pattern">模様</legend><div class="segmented-control"><label><input type="radio" name="pattern" value="stripe" checked /><span data-i18n="stripe">しま模様</span></label><label><input type="radio" name="pattern" value="solid" /><span data-i18n="solid">単色</span></label><label><input type="radio" name="pattern" value="patch" /><span data-i18n="patch">ぶち</span></label></div></fieldset>
            </div>
            <div class="control-card color-card">
              <fieldset><legend data-i18n="mainColor">メインカラー</legend><div class="swatch-row">
                <label title="奶油橘"><input type="radio" name="color" value="#e8a85d" checked /><span style="--swatch:#e8a85d"></span></label><label title="焦糖棕"><input type="radio" name="color" value="#af765c" /><span style="--swatch:#af765c"></span></label><label title="灰蓝"><input type="radio" name="color" value="#8695a5" /><span style="--swatch:#8695a5"></span></label><label title="奶白"><input type="radio" name="color" value="#e5dccb" /><span style="--swatch:#e5dccb"></span></label><label title="墨黑"><input type="radio" name="color" value="#54545b" /><span style="--swatch:#54545b"></span></label>
              </div></fieldset>
            </div>
          </section>

          <section class="tab-panel" data-panel="scene">
            <fieldset class="scene-fieldset"><legend class="sr-only">壁纸背景</legend><div class="background-options">
              <label><input type="radio" name="background" value="plants" checked /><span class="background-option"><span class="background-icon">♧</span><span><b data-i18n="plants">植物の部屋</b><small data-i18n="plantsHint">ねこが好きなグリーン</small></span></span></label>
              <label><input type="radio" name="background" value="bed" /><span class="background-option"><span class="background-icon">⌒</span><span><b data-i18n="bed">あたたかいベッド</b><small data-i18n="bedHint">やわらかくて安心</small></span></span></label>
              <label><input type="radio" name="background" value="tree" /><span class="background-option"><span class="background-icon">╞</span><span><b data-i18n="tree">キャットタワー</b><small data-i18n="treeHint">好奇心いっぱいのねこへ</small></span></span></label>
            </div></fieldset>
          </section>

          <section class="tab-panel" data-panel="profile">
            <label class="profile-field"><span><b data-i18n="catName">ねこの名前</b><small data-i18n="catNameHint">壁紙の中央に表示されます</small></span><input id="cat-name" type="text" value="Mochi" maxlength="18" placeholder="ねこの名前を入力" data-i18n-placeholder="catNamePlaceholder" /></label>
            <label class="upload-box" for="cat-photo"><input id="cat-photo" type="file" accept="image/*" /><span class="upload-icon">↑</span><span><b data-i18n="upload">写真をアップロード</b><small data-i18n="uploadHint">正面または半身写真がおすすめ</small></span></label>
          </section>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="./app.js?v=20260607-comic-wallpaper"></script>
  </body>
</html>
