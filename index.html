<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="写真から特徴を読み取り、正方形のピクセルねこ头像を生成します。" />
    <title>ピクタウン</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css?v=20260607-pikutown-no-cat-shadow" />
    <style>
      .game-header {
        grid-template-columns: auto 1fr !important;
        border-bottom: 0 !important;
      }
      .download-btn {
        display: none !important;
      }
      .avatar-preview {
        background: linear-gradient(135deg, rgba(255, 226, 239, .9), rgba(225, 246, 255, .86) 48%, rgba(255, 249, 192, .88)), #fffaf0;
        box-shadow: none !important;
      }
      .hero-stage {
        grid-template-rows: minmax(0, 1fr) !important;
      }
      .preview-arena::before {
        content: none !important;
        display: none !important;
      }
      .wallpaper-frame {
        padding: 0 !important;
      }
      .customizer-top {
        position: static !important;
      }
      .drawer-toggle {
        display: none !important;
      }
      .avatar-preview .background-scene {
        display: none !important;
      }
      .avatar-preview .paper-grain {
        display: none !important;
      }
      .avatar-preview .pose-ring {
        display: none !important;
      }
      .avatar-preview .portrait-card {
        top: 50%;
        width: 100%;
        height: 100%;
        place-items: center;
        transform: translate(-50%, -50%) !important;
        filter: none !important;
      }
      .avatar-preview .avatar-frame {
        width: min(90%, 340px);
        aspect-ratio: 1 / 1;
        border: 0 !important;
        outline: 0 !important;
        overflow: visible;
        background: transparent;
      }
      .avatar-preview .avatar-frame .photo-placeholder svg {
        width: 100%;
        height: 100%;
        transform: translateY(0);
        filter: none !important;
      }
      @media (max-width: 700px) {
        .avatar-preview .avatar-frame {
          width: min(92%, 265px);
        }
        .avatar-preview .avatar-frame .photo-placeholder svg {
          width: 100%;
          height: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <a class="brand" href="#" aria-label="ピクタウン"><span class="brand-mark">⌁</span><span data-i18n="brand">ピクタウン</span></a>
        <div class="language-switch" aria-label="Language">
          <button type="button" class="lang-btn is-active" data-lang="ja">日本語</button>
          <button type="button" class="lang-btn" data-lang="zh">中文</button>
          <button type="button" class="lang-btn" data-lang="en">EN</button>
        </div>
      </header>

      <section class="hero-stage" aria-label="Avatar preview">
        <div class="preview-arena">
          <div class="arena-orbit orbit-one"></div>
          <div class="arena-orbit orbit-two"></div>
          <div class="wallpaper-frame">
            <div class="frame-corner corner-a"></div><div class="frame-corner corner-b"></div>
            <div id="wallpaper" class="wallpaper avatar-preview">
              <div id="background-scene" class="background-scene" aria-hidden="true"></div>
              <div class="paper-grain"></div>
              <div id="pose-ring" class="pose-ring" aria-hidden="true"></div>
              <div class="portrait-card">
                <div class="photo-frame avatar-frame">
                  <img id="photo-preview" alt="猫咪照片预览" />
                  <div id="photo-placeholder" class="photo-placeholder" aria-hidden="true"><span class="placeholder-ears">⌃</span><span class="placeholder-face">• ᴗ •</span></div>
                </div>
                <div id="wallpaper-name" class="wallpaper-name">Mochi</div>
                <div class="wallpaper-caption">my tiny roommate</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="customizer" aria-labelledby="customizer-title">
        <div class="customizer-top">
          <div><h2 id="customizer-title" data-i18n="customize">ねこの見た目をカスタム</h2></div>
          <div class="customizer-actions">
            <nav class="customizer-tabs" aria-label="设置分类">
              <button type="button" class="tab-btn is-active" data-tab="photo" data-i18n="photoStep">01 写真</button>
              <button type="button" class="tab-btn" data-tab="looks" data-i18n="looks">02 見た目</button>
              <button type="button" class="tab-btn" data-tab="profile" data-i18n="profile">03 仕上げ</button>
            </nav>
          </div>
        </div>

        <form id="cat-form">
          <section class="tab-panel is-active" data-panel="photo">
            <div class="flow-card step-card">
              <b data-i18n="analysisTitle">まず写真から特徴を読む</b>
              <p id="analysis-status" data-i18n="analysisIdle">写真は保存せず、色・模様・めがねなどの要素だけを使って初版のピクセルねこを作ります。</p>
              <div id="feature-tags" class="feature-tags" aria-live="polite"></div>
            </div>
            <div class="capture-grid">
              <label class="upload-box" for="cat-photo"><input id="cat-photo" type="file" accept="image/*" /><span class="upload-icon">↑</span><span><b data-i18n="upload">写真をアップロード</b><small data-i18n="uploadHint">正面写真がおすすめ</small></span></label>
              <label class="upload-box" for="cat-camera"><input id="cat-camera" type="file" accept="image/*" capture="user" /><span class="upload-icon">◎</span><span><b data-i18n="camera">カメラで撮影</b><small data-i18n="cameraHint">撮った写真から生成</small></span></label>
            </div>
          </section>

          <section class="tab-panel" data-panel="looks">
            <div class="control-card trait-card">
              <fieldset><legend data-i18n="fur">毛並み</legend><div class="segmented-control"><label><input type="radio" name="fur" value="short" checked /><span data-i18n="shortFur">短毛</span></label><label><input type="radio" name="fur" value="long" /><span data-i18n="longFur">長毛</span></label></div></fieldset>
            </div>
            <div class="control-card trait-card">
              <fieldset><legend data-i18n="tail">しっぽ</legend><div class="segmented-control"><label><input type="radio" name="tail" value="long" checked /><span data-i18n="longTail">長い</span></label><label><input type="radio" name="tail" value="short" /><span data-i18n="shortTail">短い</span></label></div></fieldset>
            </div>
            <div class="control-card trait-card">
              <fieldset><legend data-i18n="legs">足の長さ</legend><div class="segmented-control"><label><input type="radio" name="legs" value="short" checked /><span data-i18n="shortLegs">短い</span></label><label><input type="radio" name="legs" value="long" /><span data-i18n="longLegs">長い</span></label></div></fieldset>
            </div>
            <div class="control-card trait-card">
              <fieldset><legend data-i18n="pattern">模様</legend><div class="segmented-control"><label><input type="radio" name="pattern" value="stripe" checked /><span data-i18n="stripe">しま模様</span></label><label><input type="radio" name="pattern" value="solid" /><span data-i18n="solid">単色</span></label><label><input type="radio" name="pattern" value="patch" /><span data-i18n="patch">ぶち</span></label></div></fieldset>
            </div>
            <div class="control-card color-card">
              <fieldset><legend data-i18n="mainColor">メインカラー</legend><div class="swatch-row">
                <label title="奶油橘"><input type="radio" name="color" value="#e8a85d" checked /><span style="--swatch:#e8a85d"></span></label><label title="焦糖棕"><input type="radio" name="color" value="#af765c" /><span style="--swatch:#af765c"></span></label><label title="灰蓝"><input type="radio" name="color" value="#8695a5" /><span style="--swatch:#8695a5"></span></label><label title="奶白"><input type="radio" name="color" value="#e5dccb" /><span style="--swatch:#e5dccb"></span></label><label title="墨黑"><input type="radio" name="color" value="#54545b" /><span style="--swatch:#54545b"></span></label>
              </div></fieldset>
            </div>
          </section>

          <section class="tab-panel" data-panel="profile">
            <label class="profile-field"><span><b data-i18n="catName">ねこの名前</b><small data-i18n="catNameHint">头像ファイル名に使います</small></span><input id="cat-name" type="text" value="Mochi" maxlength="18" placeholder="ねこの名前を入力" data-i18n-placeholder="catNamePlaceholder" /></label>
            <div class="download-grid">
              <button id="avatar-btn" class="secondary-btn" type="button"><span data-i18n="avatarDownload">头像を保存</span></button>
            </div>
            <div class="order-card">
              <b data-i18n="orderTitle">3Dプリント实体化</b>
              <p data-i18n="orderHint">気に入ったら、この猫を小さなフィギュアにできます。</p>
              <button id="order-btn" class="order-btn" type="button" data-i18n="orderButton">3Dプリントを相談</button>
              <div id="order-form" class="order-form" hidden>
                <label><span data-i18n="orderSize">サイズ</span><select id="order-size"><option>5cm</option><option>8cm</option><option>12cm</option></select></label>
                <label><span data-i18n="orderContact">連絡先</span><input id="order-contact" type="text" placeholder="メール / SNS" /></label>
                <textarea id="order-note" rows="2" placeholder="希望やメモ"></textarea>
                <button id="order-submit" class="secondary-btn" type="button" data-i18n="orderSubmit">下書きを作成</button>
                <p id="order-result" class="order-result"></p>
              </div>
            </div>
          </section>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="./app.js?v=20260607-pikutown-no-cat-shadow"></script>
  </body>
</html>
